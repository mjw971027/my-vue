# =====================================================
# 生产环境配置 (profile=prod)
# 使用方法: --spring.profiles.active=prod
# 所有敏感值通过环境变量注入，无硬编码默认值
# =====================================================

# 关闭debug
debug=false

# 日志级别 - 生产环境精简日志
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.com.mjw.vueback=INFO
logging.level.org.mybatis=WARN

# 数据库 - 从环境变量读取（必须设置）
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Redis - 从环境变量读取（生产环境必须设密码）
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}

# JWT - 从环境变量读取（必须设置，至少32字符）
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Druid 监控 - 生产环境关闭
spring.datasource.druid.stat-view-servlet.enabled=false
spring.datasource.druid.web-stat-filter.enabled=false

# 文件上传路径 - 生产环境
file.upload.path=${FILE_UPLOAD_PATH:/app/upload/files/}
