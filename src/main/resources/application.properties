mybatis.mapper-locations=classpath:mappers/*xml
mybatis.type-aliases-package=com.mjw.vueback.mybatis.entity
server.port=8081

# 激活的配置文件（dev=本地开发, prod=生产环境）
spring.profiles.active=dev

# 日志文件输出
logging.file.name=logs/spring-boot-app.log
logging.pattern.rolling-file-name=spring-boot-app.%d{yyyy-MM-dd}.%i.log

# 控制台输出配置
spring.main.banner-mode=console
spring.output.ansi.enabled=ALWAYS

# 数据库配置 - Druid 数据源（敏感值从 profile 配置文件读取）
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Druid 连接池配置
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20
spring.datasource.druid.max-wait=60000
spring.datasource.druid.time-between-eviction-runs-millis=60000
spring.datasource.druid.min-evictable-idle-time-millis=300000
spring.datasource.druid.validation-query=SELECT 1 FROM DUAL
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-on-return=false
spring.datasource.druid.pool-prepared-statements=true
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20
spring.datasource.druid.use-global-data-source-stat=true

# Druid 监控账号（敏感值从 profile 配置文件读取）
spring.datasource.druid.stat-view-servlet.url-pattern=/druid/*
spring.datasource.druid.stat-view-servlet.reset-enable=true
spring.datasource.druid.stat-view-servlet.login-username=${DRUID_USERNAME:admin}
spring.datasource.druid.stat-view-servlet.login-password=${DRUID_PASSWORD:admin123}

# Druid 监控过滤器配置
spring.datasource.druid.web-stat-filter.url-pattern=/*
spring.datasource.druid.web-stat-filter.exclusions=*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*

# 监控 SQL
spring.datasource.druid.filter.stat.enabled=true
spring.datasource.druid.filter.stat.log-slow-sql=true
spring.datasource.druid.filter.stat.slow-sql-millis=5000
spring.datasource.druid.filter.stat.merge-sql=true

# 监控 URL
spring.datasource.druid.filter.wall.enabled=true
spring.datasource.druid.filter.wall.config.multi-statement-allow=true

# JWT 配置（敏感值从 profile 配置文件读取）

# Redis 配置（敏感值从 profile 配置文件读取）
spring.redis.database=0
spring.redis.timeout=1800000

# Redis 连接池配置
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-wait=-1
spring.redis.lettuce.pool.max-idle=5
spring.redis.lettuce.pool.min-idle=0

# 文件上传路径（从 profile 配置文件读取）
