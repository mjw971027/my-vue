mybatis.mapper-locations=classpath:mappers/*xml
mybatis.type-aliases-package=com.mjw.vueback.mybatis.entity
server.port=8081

# 开启debug模式，查看详细启动日志
debug=true

# 日志配置 - 控制台显示更详细日志
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.mjw.vueback=DEBUG
logging.level.org.mybatis=DEBUG

# 日志文件输出（防止控制台显示不全）
logging.file.name=logs/spring-boot-app.log
logging.pattern.rolling-file-name=spring-boot-app.%d{yyyy-MM-dd}.%i.log

# 控制台输出配置
spring.main.banner-mode=console
spring.output.ansi.enabled=ALWAYS

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/mysql?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=mjw001
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT 配置
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000


