# =====================================================
# 开发环境配置 (profile=dev)
# 使用方法: --spring.profiles.active=dev
# =====================================================

# 开发模式开启debug
debug=true

# 日志级别 - 开发环境详细日志
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.mjw.vueback=DEBUG
logging.level.org.mybatis=DEBUG

# 数据库 - 本地开发环境
spring.datasource.url=jdbc:mysql://localhost:3306/mysql?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Redis - 本地开发环境（无密码）
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=

# JWT - 开发环境密钥（仅用于本地开发！）
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Druid 监控 - 开发环境开启
spring.datasource.druid.stat-view-servlet.enabled=true
spring.datasource.druid.web-stat-filter.enabled=true

# 文件上传路径 - 开发环境
file.upload.path=E:/upload/files/
